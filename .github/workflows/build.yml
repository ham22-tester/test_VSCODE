name: Build ZMK firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf ccache dfu-util device-tree-compiler wget
          python -m pip install --upgrade pip
          pip install west pyelftools

      - name: Initialize ZMK workspace
        run: |
          git clean -fdx
          rm -rf build .west zmk zephyr
          west init -l config
          west update
          test -d "$GITHUB_WORKSPACE/zmk/app" || { echo "ZMK app source not found"; exit 1; }

      - name: Build firmware
        run: |
          cd "$GITHUB_WORKSPACE"
          west build -b nice_nano -d "$GITHUB_WORKSPACE/build" -s "$GITHUB_WORKSPACE/zmk/app" -p always -- -DSHIELD=tca9555_keyboard -DZMK_CONFIG="$GITHUB_WORKSPACE/config"
